{% extends 'base.html' %}
{% block title %}Novo Usuário{% endblock %}
{% block content %}
<div class="page-header">
  <h1 class="page-title">Novo Usuário</h1>
  <a href="{{ url_for('usuarios') }}" class="btn btn-outline">← Voltar</a>
</div>
<div class="card">
  <form method="POST">
    <div class="form-grid">
      <div class="form-group">
        <label>Nome completo *</label>
        <input type="text" name="nome" class="form-control" required>
      </div>
      <div class="form-group">
        <label>E-mail *</label>
        <input type="email" name="email" class="form-control" required>
      </div>
      <div class="form-group">
        <label>Senha * (mínimo 6 caracteres)</label>
        <input type="password" name="senha" class="form-control" minlength="6" required>
      </div>
      <div class="form-group">
        <label>Perfil *</label>
        <select name="perfil" class="form-control" required>
          <option value="atendente">Atendente</option>
          <option value="mecanico">Mecânico</option>
          <option value="gestor">Gestor</option>
        </select>
      </div>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Cadastrar usuário</button>
      <a href="{{ url_for('usuarios') }}" class="btn btn-outline">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
