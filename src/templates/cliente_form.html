{% extends 'base.html' %}
{% block title %}{{ 'Editar' if cliente else 'Novo' }} Cliente{% endblock %}
{% block content %}
<div class="page-header">
  <h1 class="page-title">{{ 'Editar Cliente' if cliente else 'Novo Cliente' }}</h1>
  <a href="{{ url_for('clientes') }}" class="btn btn-outline">← Voltar</a>
</div>
<div class="card">
  <form method="POST">
    <div class="form-grid">
      <div class="form-group">
        <label>Nome completo *</label>
        <input type="text" name="nome" class="form-control" value="{{ cliente.nome if cliente else '' }}" required>
      </div>
      <div class="form-group">
        <label>CPF *</label>
        <input type="text" name="cpf" class="form-control" value="{{ cliente.cpf if cliente else '' }}" placeholder="000.000.000-00" required>
      </div>
      <div class="form-group">
        <label>Telefone</label>
        <input type="text" name="telefone" class="form-control" value="{{ cliente.telefone if cliente else '' }}" placeholder="(00) 00000-0000">
      </div>
      <div class="form-group">
        <label>E-mail</label>
        <input type="email" name="email" class="form-control" value="{{ cliente.email if cliente else '' }}">
      </div>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">{{ 'Salvar alterações' if cliente else 'Cadastrar cliente' }}</button>
      <a href="{{ url_for('clientes') }}" class="btn btn-outline">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
