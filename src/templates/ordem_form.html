{% extends 'base.html' %}
{% block title %}Nova Ordem de Serviço{% endblock %}
{% block content %}
<div class="page-header">
  <h1 class="page-title">Nova Ordem de Serviço</h1>
  <a href="{{ url_for('ordens') }}" class="btn btn-outline">← Voltar</a>
</div>
<div class="card">
  <form method="POST">
    <div class="form-group">
      <label>Cliente *</label>
      <select name="cliente_id" id="cliente_id" class="form-control" required>
        <option value="">Selecione o cliente...</option>
        {% for c in clientes %}
        <option value="{{ c.id }}">{{ c.nome }} — {{ c.cpf }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-group">
      <label>Veículo *</label>
      <select name="veiculo_id" id="veiculo_id" class="form-control" required>
        <option value="">Selecione primeiro o cliente...</option>
      </select>
    </div>
    <div class="form-group">
      <label>Descrição do serviço *</label>
      <textarea name="descricao" class="form-control" rows="3" placeholder="Descreva o serviço a ser realizado..." required></textarea>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Abrir Ordem de Serviço</button>
      <a href="{{ url_for('ordens') }}" class="btn btn-outline">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
{% block scripts %}
<script>
document.getElementById('cliente_id').addEventListener('change', function() {
  const clienteId = this.value;
  const veiculoSelect = document.getElementById('veiculo_id');
  veiculoSelect.innerHTML = '<option value="">Carregando...</option>';
  if (!clienteId) { veiculoSelect.innerHTML = '<option value="">Selecione primeiro o cliente...</option>'; return; }
  fetch(`/api/veiculos/${clienteId}`)
    .then(r => r.json())
    .then(data => {
      if (data.veiculos.length === 0) {
        veiculoSelect.innerHTML = '<option value="">Nenhum veículo cadastrado</option>';
      } else {
        veiculoSelect.innerHTML = '<option value="">Selecione o veículo...</option>';
        data.veiculos.forEach(v => {
          veiculoSelect.innerHTML += `<option value="${v.id}">${v.texto}</option>`;
        });
      }
    });
});
</script>
{% endblock %}
