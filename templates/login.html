<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Oficina Pro</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-box { background: #fff; border-radius: 16px; padding: 2.5rem 2rem; width: 100%; max-width: 380px; box-shadow: 0 8px 32px rgba(0,0,0,.3); }
    .login-logo { text-align: center; margin-bottom: 2rem; }
    .login-logo .icon { font-size: 3rem; }
    .login-logo h1 { font-size: 1.4rem; color: #1a1a2e; margin-top: .5rem; }
    .login-logo p { font-size: .85rem; color: #888; margin-top: 4px; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: .875rem; font-weight: 500; color: #444; margin-bottom: 6px; }
    .form-control { width: 100%; padding: 10px 14px; border: 1.5px solid #ddd; border-radius: 8px; font-size: .9rem; outline: none; transition: border .2s; }
    .form-control:focus { border-color: #e63946; }
    .btn-login { width: 100%; padding: 11px; background: #e63946; color: #fff; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: .5rem; transition: background .2s; }
    .btn-login:hover { background: #c1121f; }
    .alert { padding: 10px 14px; border-radius: 8px; margin-bottom: 1rem; font-size: .85rem; background: #f8d7da; color: #842029; border: 1px solid #f5c2c7; }
    .hint { text-align: center; margin-top: 1.25rem; font-size: .8rem; color: #aaa; background: #f8f9fa; border-radius: 8px; padding: 10px; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="login-logo">
      <div class="icon">🔧</div>
      <h1>Oficina Pro</h1>
      <p>Sistema de Controle de Manutenção</p>
    </div>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert">{{ message }}</div>
      {% endfor %}
    {% endwith %}
    <form method="POST">
      <div class="form-group">
        <label>E-mail</label>
        <input type="email" name="email" class="form-control" placeholder="seu@email.com" required autofocus>
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input type="password" name="senha" class="form-control" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-login">Entrar</button>
    </form>
  </div>
</body>
</html>
